<!DOCTYPE html>
<html>
<head>
  <title>Simple PDF Splitter</title>
</head>
<body>

<h2>PDF Splitter</h2>

<input type="file" id="pdfFile" accept="application/pdf"><br><br>
<input type="number" id="pageNumber" placeholder="Enter page number"><br><br>
<button onclick="splitPDF()">Split PDF</button>

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<script>
async function splitPDF() {
  const fileInput = document.getElementById('pdfFile');
  const pageNumber = parseInt(document.getElementById('pageNumber').value);

  if (!fileInput.files[0]) {
    alert("Please upload a PDF");
    return;
  }

  const file = fileInput.files[0];
  const arrayBuffer = await file.arrayBuffer();

  const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);
  const newPdf = await PDFLib.PDFDocument.create();

  const [page] = await newPdf.copyPages(pdfDoc, [pageNumber - 1]);
  newPdf.addPage(page);

  const pdfBytes = await newPdf.save();

  const blob = new Blob([pdfBytes], { type: 'application/pdf' });
  const url = URL.createObjectURL(blob);

  const a = document.createElement('a');
  a.href = url;
  a.download = "split.pdf";
  a.click();
}
</script>

</body>
</html>
